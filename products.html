<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
</head>
<body>

  <div class="navbar">
    <h2>Productos</h2>
    <div class="nav-actions">
      <button onclick="goTo('home.html')" class="back-btn">Volver</button>
      <button onclick="logout()" class="logout">Cerrar sesión</button>
    </div>
  </div>

  <div class="page">
    <div class="card page-card">
      <h3>Cargar producto</h3>

      <input type="text" id="productName" placeholder="Nombre del producto">
      <input type="text" id="productCode" placeholder="Código de barras">
      <input type="number" id="productStock" placeholder="Stock teórico">

      <div class="scan-top-actions">
        <button id="scanProductCodeBtn" type="button">Escanear código</button>
        <button id="stopProductCameraBtn" type="button" class="secondary-btn">Cerrar cámara</button>
      </div>

      <div id="productReader" class="reader-box hidden"></div>

      <button id="saveProductBtn">Guardar producto</button>

      <p id="productMsg" class="info-msg"></p>
    </div>

    <div class="card page-card mt-20">
      <h3>Importar productos desde CSV</h3>

      <input type="file" id="csvFileInput" accept=".csv">
      <button id="importCsvBtn">Importar CSV</button>

      <p class="subtitle">
        Formato esperado: codigo,nombre,stockTeorico
      </p>

      <p id="csvMsg" class="info-msg"></p>
    </div>

    <div class="card page-card mt-20">
      <h3>Productos guardados</h3>
      <div id="productsList" class="products-list"></div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="app.js"></script>
</body>
</html>
