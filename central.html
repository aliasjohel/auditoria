<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Control</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
</head>
<body>

  <div class="navbar">
    <h2>Central de Control</h2>
    <div class="nav-actions">
      <button onclick="goTo('home.html')" class="back-btn">Volver</button>
      <button onclick="logout()" class="logout">Cerrar sesión</button>
    </div>
  </div>

  <div class="page">
    <div class="card page-card">
      <h3>Importar conteos de equipos</h3>

      <input type="file" id="teamCountFileInput" accept=".json" multiple>
      <button id="importTeamCountsBtn" type="button">Importar archivos</button>

      <p id="centralMsg" class="info-msg"></p>
      <div id="centralSummary" class="products-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
