<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Control</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">
</head>
<body>

  <div class="navbar">
    <h2>Nuevo Control</h2>
    <div class="nav-actions">
      <button onclick="goTo('home.html')" class="back-btn">Volver</button>
      <button onclick="logout()" class="logout">Cerrar sesión</button>
    </div>
  </div>

  <div class="page">
    <div class="card page-card">
      <h3>Crear auditoría</h3>

      <input id="controlCliente" type="text" placeholder="Nombre del cliente">
<input id="controlSucursal" type="text" placeholder="Sucursal">
<input id="controlFecha" type="date">
<textarea id="controlObs" placeholder="Observaciones"></textarea>

<button id="saveControlBtn">Guardar control</button>
<p id="controlMsg" class="info-msg"></p>
  </div>

  <script src="app.js"></script>
</body>
    </div>
